    description: >-
      Veeva Vault provides life sciences cloud platform APIs for regulatory document
      management, quality management (QMS), clinical operations, and commercial content
      management. REST APIs enable document lifecycle management, workflow automation,
      and compliance-validated data exchange.

  - aid: veeva:veeva-vault-java-sdk
    name: Veeva Vault Java SDK
    tags:
      - Java
      - Life Sciences
      - Pharma
      - SDK
    image: https://raw.githubusercontent.com/api-evangelist/veeva/refs/heads/main/image.png
    humanURL: https://developer.veevavault.com/sdk/
    baseURL: https://myvault.veevavault.com/api
    properties:
      - url: https://developer.veevavault.com/sdk/
        type: Documentation
      - url: https://github.com/veeva/vault-api-library
        type: SDKs
      - url: https://mvnrepository.com/artifact/com.veeva/vault-api-library
        type: SDKs
        title: Maven Central
    description: >-
      The Veeva Vault Java SDK (VAPIL) is an open-source Java-based REST API client
      for the Vault REST API. Provides type-safe access to all Vault API operations
      including document management, object CRUD, workflow execution, and administrative
      functions.

  - aid: veeva:veeva-vault-query-language
    name: Veeva Vault Query Language (VQL) API
    tags:
      - Life Sciences
      - Pharma
      - Query Language
      - SQL
    image: https://raw.githubusercontent.com/api-evangelist/veeva/refs/heads/main/image.png
    humanURL: https://developer.veevavault.com/vql/
    baseURL: https://myvault.veevavault.com/api
    properties:
      - url: https://developer.veevavault.com/vql/
        type: Documentation
      - url: openapi/veeva-vault-openapi.yml
        type: OpenAPI
    description: >-
      Vault Query Language (VQL) provides SQL-like query capabilities for accessing
      and retrieving Vault data. Supports SELECT, FROM, WHERE, ORDER BY, relationship
      queries, and functions for querying documents, objects, users, workflows, and
      system data.

  - aid: veeva:veeva-vault-direct-data-api
    name: Veeva Vault Direct Data API
    tags:
      - Bulk Data
      - Data Access
      - Life Sciences
      - Pharma
    image: https://raw.githubusercontent.com/api-evangelist/veeva/refs/heads/main/image.png
    humanURL: https://developer.veevavault.com/docs
    baseURL: https://myvault.veevavault.com/api
    properties:
      - url: https://developer.veevavault.com/docs
        type: Documentation
    description: >-
      The Veeva Vault Direct Data API provides high-speed, read-only bulk access to
      Vault data for integration, analytics, and reporting purposes. Supports bulk
      export of documents, objects, and attachment field files for up to 500 records.

