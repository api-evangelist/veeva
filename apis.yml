  - type: Features
    data:
      - name: Document Lifecycle Management
        description: >-
          Full lifecycle management for controlled documents including draft, review,
          approval, and archival states with audit trails for regulatory compliance.
      - name: Vault Query Language
        description: >-
          SQL-like query engine for retrieving Vault data across documents, objects,
          users, and workflows with support for relationship traversal.
      - name: Direct Data API
        description: >-
          High-speed bulk data export for up to 500 records at a time for analytics,
          reporting, and integration with downstream systems.
      - name: Vault Object CRUD
        description: >-
          Create, read, update, and delete operations on configurable Vault business
          objects (studies, products, sites, etc.) via REST API.
      - name: Session Authentication
        description: >-
          Username/password authentication returning a session ID for subsequent API
          calls, with multi-vault support for complex enterprise deployments.
      - name: Java SDK (VAPIL)
        description: >-
          Open-source Java client library providing type-safe access to all Vault
          REST API operations with automatic session management and error handling.
  - type: UseCases
    data:
      - name: Regulatory Document Submission
        description: >-
          Automate the assembly and submission of regulatory dossiers (CTD, eCTD)
          by programmatically managing document lifecycle, approvals, and publishing.
      - name: Clinical Trial Data Management
        description: >-
          Integrate Vault with CTMS, EDC, and LIMS systems to automate study document
          workflows, protocol amendments, and site activation packages.
      - name: Quality Management Automation
        description: >-
          Automate SOPs, CAPAs, deviations, and audit workflows in QMS Vault through
          lifecycle actions, object creation, and workflow task assignment.
      - name: Content Analytics
        description: >-
          Export Vault document and object data in bulk for BI dashboards, compliance
          reporting, and cross-Vault analytics using the Direct Data API.
      - name: Enterprise Integration
        description: >-
          Integrate Vault with SAP, Salesforce, Veeva CRM, and other enterprise
          systems using REST APIs for bidirectional data synchronization.
  - type: Integrations
    data:
      - name: Veeva CRM
        description: >-
          Bidirectional integration between Vault and Veeva CRM for commercial content
          lifecycle management and promotional material approval workflows.
      - name: Salesforce
        description: >-
          Connect Vault document approval workflows with Salesforce opportunities,
          accounts, and contacts via REST API integration.
      - name: SAP
        description: >-
          Synchronize quality events, deviations, and regulatory submissions between
          Vault and SAP ERP using REST API and Direct Data API.
      - name: MuleSoft
        description: >-
          Pre-built MuleSoft connectors for Vault REST API integration with enterprise
          middleware platforms and iPaaS solutions.
      - name: Microsoft Azure
        description: >-
          Deploy Vault integrations on Azure using Logic Apps, Azure Functions, or
          Azure Data Factory with Vault REST API support.

  - type: Integrations
    url: https://www.veeva.com/meet-veeva/partners/
