description: 'FOCUS-aligned FinOps stub for Veeva: enterprise life-sciences SaaS subscription with no public
  pricing or usage/billing API. API access is bundled with the Vault / CRM subscription.'
sources:
  - https://www.veeva.com/products/
  - https://developer.veevavault.com/api/26.1/
notes: No public pricing. Meters not invented; API usage is observable per-tenant via API Usage Logs but
  is not a billable line. Reconciliation deferred pending customer-portal billing API discovery.
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Veeva Vault / CRM
  ServiceCategory: Life Sciences SaaS
  ProviderName: Veeva
  PublisherName: Veeva Systems Inc.
  InvoiceIssuerName: Veeva Systems Inc.
  BillingCurrency: USD
meters:
  - name: tenant_subscription
    description: Annual Vault / CRM tenant subscription line; sub-meters not publicly published.
    unit: varies
    aggregation: sum
  - name: api_usage_observed
    description: Observed API call count from in-product API Usage Logs. Not a billable meter; provided
      for capacity tracking and rate-limit insight.
    unit: request
    aggregation: sum
principles:
  - name: Visibility
    description: Veeva exposes per-tenant API call telemetry through Admin > Settings > Logs > API Usage
      Logs and rate-limit response headers; cost telemetry is invoice-level only.
  - name: Allocation
    description: Allocation is contract-level (per Vault / CRM tenant); internal chargeback rides on
      seat / module / data-volume scoping in the order form.
  - name: Optimization
    description: 'Optimization levers are scope-driven: which Vaults are licensed, seat counts, and integration
      patterns (batch vs interactive). Renewal is the primary optimization checkpoint.'
  - name: Accountability
    description: Accountability sits with the platform owner team that holds the Veeva tenant agreement;
      finance owns the annual subscription line.
