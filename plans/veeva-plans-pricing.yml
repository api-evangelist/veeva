description: Veeva (Veeva Vault and Veeva CRM) is sold via enterprise sales to life-sciences customers.
  No public price list, no self-serve developer plan, no published per-tier API quotas. API access (Vault
  API, CRM API) is included with the underlying product subscription.
sources:
  - https://www.veeva.com/products/
notes: Veeva publishes no public pricing. API access is bundled with paid product subscriptions and configured
  per Vault tenant. Reconciliation to a single Contact Sales plan; revisit if Veeva publishes self-serve
  developer pricing.
plans:
