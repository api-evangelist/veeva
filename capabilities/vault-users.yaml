naftiko: 1.0.0-alpha2
info:
  label: Veeva Vault REST API — Users
  description: 'Veeva Vault REST API — Users. 1 operations. Lead operation: Veeva List Vault Users. Self-contained Naftiko
    capability covering one Veeva business surface.'
  tags:
  - Veeva
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VEEVA_API_KEY: VEEVA_API_KEY
capability:
  consumes:
  - type: http
    namespace: vault-users
    baseUri: https://{vaultDomain}/api/v25.3
    description: Veeva Vault REST API — Users business capability. Self-contained, no shared references.
    resources:
    - name: objects-users
      path: /objects/users
      operations:
      - name: listusers
        method: GET
        description: Veeva List Vault Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.VEEVA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: vault-users-rest
    port: 8080
    description: REST adapter for Veeva Vault REST API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/objects/users
      name: objects-users
      description: REST surface for objects-users.
      operations:
      - method: GET
        name: listusers
        description: Veeva List Vault Users
        call: vault-users.listusers
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vault-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Veeva Vault REST API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: veeva-list-vault-users
      description: Veeva List Vault Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vault-users.listusers
      with:
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
