naftiko: "1.0.0-alpha1"

info:
  label: "Veeva Vault REST API"
  description: >-
    Veeva Vault REST API for life sciences document lifecycle management, object CRUD,
    VQL query execution, user management, and workflow automation.
  tags:
    - Veeva
    - Vault
    - Life Sciences
    - Pharma
    - Document Management
    - Regulatory
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VEEVA_VAULT_SESSION_ID: VEEVA_VAULT_SESSION_ID
      VEEVA_VAULT_DOMAIN: VEEVA_VAULT_DOMAIN

capability:
  consumes:
    - type: http
      namespace: vault-api
      baseUri: "https://{{env.VEEVA_VAULT_DOMAIN}}/api/v25.3"
      description: "Veeva Vault REST API v25.3"
      authentication:
        type: apikey
        key: Authorization
        value: "{{env.VEEVA_VAULT_SESSION_ID}}"
        placement: header
      resources:
        - name: authentication
          path: /auth
          description: "Session management — authenticate and obtain Vault session IDs"
          operations:
            - name: authenticate-user
              method: POST
              description: "Authenticate with username and password to obtain a Vault session ID"
              inputParameters:
                - name: username
                  in: body
                  type: string
                  required: true
                  description: "Vault username (email address)"
                - name: password
                  in: body
                  type: string
                  required: true
                  description: "Vault password"
                - name: vaultDNS
                  in: body
                  type: string
                  required: false
                  description: "Target Vault DNS for multi-vault environments"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: documents
          path: /objects/documents
          description: "Document lifecycle management — list, create, retrieve, update, and delete documents"
          operations:
            - name: list-documents
              method: GET
              description: "List all documents accessible to the authenticated user"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results (default 200, max 1000)"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "Sort field and direction (e.g. name__v asc)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-document
              method: POST
              description: "Create a new document record in Vault with optional source file upload"
              inputParameters:
                - name: name__v
                  in: body
                  type: string
                  required: true
                  description: "Document name"
                - name: type__v
                  in: body
                  type: string
                  required: true
                  description: "Document type API name"
                - name: lifecycle__v
                  in: body
                  type: string
                  required: true
                  description: "Document lifecycle API name"
                - name: status__v
                  in: body
                  type: string
                  required: false
                  description: "Initial lifecycle state"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: document
          path: /objects/documents/{documentId}
          description: "Single document operations — get, update, delete"
          operations:
            - name: get-document
              method: GET
              description: "Retrieve metadata and properties for a specific document"
              inputParameters:
                - name: documentId
                  in: path
                  type: integer
                  required: true
                  description: "Vault document ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-document
              method: PUT
              description: "Update document field values"
              inputParameters:
                - name: documentId
                  in: path
                  type: integer
                  required: true
                  description: "Vault document ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-document
              method: DELETE
              description: "Delete a document and all versions"
              inputParameters:
                - name: documentId
                  in: path
                  type: integer
                  required: true
                  description: "Vault document ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: document-actions
          path: /objects/documents/{documentId}/actions/{actionName}
          description: "Document lifecycle actions — perform state transitions"
          operations:
            - name: perform-document-action
              method: POST
              description: "Execute a user action on a document to change its lifecycle state"
              inputParameters:
                - name: documentId
                  in: path
                  type: integer
                  required: true
                  description: "Vault document ID"
                - name: actionName
                  in: path
                  type: string
                  required: true
                  description: "Lifecycle action API name (e.g. Approve, Submit for Review)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: objects
          path: /vobjects/{objectName}
          description: "Vault object records — list and create configurable business entities"
          operations:
            - name: list-object-records
              method: GET
              description: "Return records for a Vault object (studies, products, sites, etc.)"
              inputParameters:
                - name: objectName
                  in: path
                  type: string
                  required: true
                  description: "Vault object API name (e.g. study__v)"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum records to return"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of fields to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-object-record
              method: POST
              description: "Create a new record for the specified Vault object"
              inputParameters:
                - name: objectName
                  in: path
                  type: string
                  required: true
                  description: "Vault object API name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: object-record
          path: /vobjects/{objectName}/{recordId}
          description: "Single object record operations — get, update, delete"
          operations:
            - name: get-object-record
              method: GET
              description: "Return a single record for a Vault object"
              inputParameters:
                - name: objectName
                  in: path
                  type: string
                  required: true
                  description: "Vault object API name"
                - name: recordId
                  in: path
                  type: string
                  required: true
                  description: "Object record ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-object-record
              method: PUT
              description: "Update fields on an existing Vault object record"
              inputParameters:
                - name: objectName
                  in: path
                  type: string
                  required: true
                  description: "Vault object API name"
                - name: recordId
                  in: path
                  type: string
                  required: true
                  description: "Object record ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-object-record
              method: DELETE
              description: "Delete a specific Vault object record"
              inputParameters:
                - name: objectName
                  in: path
                  type: string
                  required: true
                  description: "Vault object API name"
                - name: recordId
                  in: path
                  type: string
                  required: true
                  description: "Object record ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: query
          path: /query
          description: "VQL query execution — SQL-like queries across documents, objects, and users"
          operations:
            - name: execute-vql-query
              method: GET
              description: "Execute a Vault Query Language (VQL) query to retrieve Vault data"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "VQL query string (e.g. SELECT id, name__v FROM documents)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: users
          path: /objects/users
          description: "User management — list Vault users"
          operations:
            - name: list-users
              method: GET
              description: "Return all active users in the Vault"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum users to return"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
